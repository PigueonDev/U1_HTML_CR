<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
    <meta name="color-scheme" content="light dark">
</head>
<body>
    <main class="login-container">
        <div class="login-box" role="region" aria-label="Formulario de inicio de sesión">
            <h1>Iniciar sesión</h1>
            <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Correo</label>
                        <div class="input-field">
                            <span class="icon" aria-hidden="true">
                                <!-- email SVG -->
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M3 5.5A2.5 2.5 0 015.5 3h13A2.5 2.5 0 0121 5.5v13A2.5 2.5 0 0118.5 21h-13A2.5 2.5 0 013 18.5v-13z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M21 6.5l-9 6-9-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <input type="email" id="email" name="email" required autocomplete="email" aria-label="Correo">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-field">
                            <span class="icon" aria-hidden="true">
                                <!-- lock SVG -->
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="3" y="11" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M7 11V8a5 5 0 0110 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <input type="password" id="password" name="password" required autocomplete="current-password" aria-label="Contraseña">
                        </div>
                    </div>

                <button type="submit">Iniciar sesión</button>
            </form>

            <div class="login-links">
                <button type="button" class="forgot" id="openForgot">¿Olvidaste la contraseña?</button>
                <button type="button" class="signup" id="openSignup">Registrarse</button>
            </div>
        </div>
    </main>

    <!-- Modal: Olvidaste la contraseña -->
    <div class="modal" id="forgotModal" aria-hidden="true">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
            <button class="modal-close" id="closeForgot" aria-label="Cerrar">×</button>
            <h2 id="forgotTitle">Recuperar contraseña</h2>
            <form id="forgotForm">
                <label for="forgotEmail">Ingrese correo</label>
                <input type="email" id="forgotEmail" name="forgotEmail" required autocomplete="email">
                <div class="modal-actions">
                    <button type="submit">Enviar</button>
                    <button type="button" id="cancelForgot">Cancelar</button>
                </div>
            </form>
            <div class="modal-success" id="forgotSuccess" hidden>
                <p>Se ha enviado un enlace al correo proporcionado (simulado).</p>
                <button id="forgotDone">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Registrarse -->
    <div class="modal" id="signupModal" aria-hidden="true">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
            <button class="modal-close" id="closeSignup" aria-label="Cerrar">×</button>
            <h2 id="signupTitle">Registrarse</h2>
            <form id="signupForm">
                <label for="signupName">Nombre</label>
                <input type="text" id="signupName" name="signupName" required>

                <label for="signupEmail">Correo</label>
                <input type="email" id="signupEmail" name="signupEmail" required autocomplete="email">

                <label for="signupPassword">Contraseña</label>
                <input type="password" id="signupPassword" name="signupPassword" required autocomplete="new-password">

                <div class="modal-actions">
                    <button type="submit">Crear cuenta</button>
                    <button type="button" id="cancelSignup">Cancelar</button>
                </div>
            </form>
            <div class="modal-success" id="signupSuccess" hidden>
                <p>Cuenta creada correctamente (simulado).</p>
                <button id="signupDone">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
