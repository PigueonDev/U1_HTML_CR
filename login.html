<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
    <meta name="color-scheme" content="light dark">
</head>
<body>
    <main class="login-container">
        <div class="login-box" role="region" aria-label="Formulario de inicio de sesión">
            <!-- Logo: coloque el archivo de imagen en assets/logo.png -->
            <div class="logo-wrap" aria-hidden="true">
                <img src="assets/logo.png" alt="Sportclub" class="site-logo">
            </div>
            <h1>Iniciar sesión</h1>
            <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <label for="email">Correo</label>
                        <div class="input-field">
                            <span class="icon" aria-hidden="true">
                                <!-- email SVG -->
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M3 5.5A2.5 2.5 0 015.5 3h13A2.5 2.5 0 0121 5.5v13A2.5 2.5 0 0118.5 21h-13A2.5 2.5 0 013 18.5v-13z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M21 6.5l-9 6-9-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <input type="email" id="email" name="email" required autocomplete="email" aria-label="Correo">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-field">
                            <span class="icon" aria-hidden="true">
                                <!-- lock SVG -->
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="3" y="11" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M7 11V8a5 5 0 0110 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <input type="password" id="password" name="password" required autocomplete="current-password" aria-label="Contraseña">
                        </div>
                    </div>

                <button type="submit" class="btn btn-primary login-submit">Iniciar sesión</button>
            </form>

            <div class="login-links" aria-label="Accesos rápidos">
                <a href="recover.html" class="login-text-link">¿Olvidaste la contraseña?</a>
                <a href="register.html" class="login-text-link">Registrarse</a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
