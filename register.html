<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registrarse</title>
	<link rel="stylesheet" href="style.css">
	<meta name="color-scheme" content="light dark">
</head>
<body>
	<main class="login-container">
		<div class="login-box" role="region" aria-label="Formulario de registro">
			<div class="logo-wrap" aria-hidden="true">
				<img src="assets/logo.png" alt="Sportclub" class="site-logo">
			</div>

			<h1>Registrarse</h1>

			<form id="registerForm" class="login-form">
				<!-- Campos obligatorios -->
				<div class="form-field">
					<label for="regEmail">Correo electrónico</label>
					<input type="email" id="regEmail" name="email" required autocomplete="email">
				</div>

				<div class="form-field">
					<label for="regPassword">Contraseña</label>
					<input type="password" id="regPassword" name="password" required autocomplete="new-password">
				</div>

				<!-- Campos opcionales (según criterio del estudiante) -->
				<div class="form-field">
					<label for="regName">Nombre (opcional)</label>
					<input type="text" id="regName" name="name" autocomplete="name">
				</div>

				<div class="form-field">
					<label for="regAge">Edad (opcional)</label>
					<input type="number" id="regAge" name="age" inputmode="numeric" min="0" max="120">
				</div>

				<div class="form-field">
					<label for="regPracticeSport">¿Practica deporte? (opcional)</label>
					<select id="regPracticeSport" name="practiceSport">
						<option value="" selected>Selecciona una opción</option>
						<option value="si">Sí</option>
						<option value="no">No</option>
					</select>
				</div>

				<div class="form-field">
					<label for="regSportType">Tipo de deporte (opcional)</label>
					<input type="text" id="regSportType" name="sportType" placeholder="Ej: fútbol, gym, natación...">
				</div>

				<div class="form-field">
					<label for="regGoal">Objetivo personal (opcional)</label>
					<textarea id="regGoal" name="goal" rows="3" placeholder="Ej: bajar de peso, ganar masa, mejorar resistencia..."></textarea>
				</div>

				<div class="form-field">
					<label for="regLevel">Nivel (opcional)</label>
					<select id="regLevel" name="level">
						<option value="" selected>Selecciona tu nivel</option>
						<option value="principiante">Principiante</option>
						<option value="intermedio">Intermedio</option>
						<option value="avanzado">Avanzado</option>
					</select>
				</div>

				<button type="submit" class="btn btn-primary login-submit">Registrarse</button>
			</form>

			<div class="login-links" aria-label="Volver">
				<a href="login.html" class="login-text-link">Volver al login</a>
			</div>
		</div>
	</main>

	<script src="app.js"></script>
</body>
</html>
