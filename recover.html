<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Recuperar contraseña</title>
	<link rel="stylesheet" href="style.css">
	<meta name="color-scheme" content="light dark">
</head>

<body>
	<main class="login-container">
		<div class="login-box" role="region" aria-label="Recuperación de contraseña">
			<div class="logo-wrap" aria-hidden="true">
				<img src="assets/logo.png" alt="Sportclub" class="site-logo">
			</div>

			<h1>Recuperar contraseña</h1>

			<form id="recoverForm" class="login-form">
				<div class="form-field">
					<label for="recoverEmail">Correo electrónico</label>
					<input type="email" id="recoverEmail" name="email" required autocomplete="email">
				</div>

				<button type="submit" class="btn btn-primary login-submit">Recuperar contraseña</button>

				<div class="form-message" id="recoverMessage" hidden>
					Se ha enviado un enlace de recuperación a su correo (simulado).
				</div>
			</form>

			<div class="login-links" aria-label="Volver">
				<a href="login.html" class="login-text-link">Volver al login</a>
			</div>
		</div>
	</main>

	<script src="app.js"></script>
</body>
</html>
